name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: java_practice_test
      id: java_practice_test
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: java_practice_test
        setup-command: ''
        command: mvn test
        timeout: 10
        max-score: 100
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        JAVA_PRACTICE_TEST_RESULTS: "${{steps.java_practice_test.outputs.result}}"
      with:
        runners: java_practice_test
